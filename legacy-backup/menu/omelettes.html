<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omelettes | VIYA Cafe</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<!-- Background Video -->
<div class="video-bg">
  <video autoplay muted loop playsinline>
    <source src="../background.mp4" type="video/mp4">
  </video>
</div>
<div class="video-overlay"></div>

<!-- Header -->
<header class="site-header">
  <h1>Omelettes</h1>
  <p>Fresh & Hot Egg Specials</p>

  <div class="nav-buttons">
    <a href="../index.html">⬅ Home</a>
  </div>
</header>

<!-- Menu Section -->
<section class="menu-section">

  <div class="menu-item">
    <img src="../half boiled omelette.jpg" alt="Plain Omelette">
    <div class="menu-text">
      <strong>Half Boil Omelette</strong>
    </div>
    <span class="price">₹25</span>
  </div>

  <div class="menu-item">
    <img src="../single egg omelette.jpg" alt="Masala Omelette">
    <div class="menu-text">
      <strong>Single Egg Omelette</strong>
    </div>
    <span class="price">₹30</span>
  </div>

  <div class="menu-item">
    <img src="../double egg omelette.jpg" alt="Cheese Omelette">
    <div class="menu-text">
      <strong>Double Egg Omelette</strong>
    </div>
    <span class="price">₹40</span>
  </div>

  <div class="menu-item">
    <img src="../bread omelette.jpg" alt="Double Egg Omelette">
    <div class="menu-text">
      <strong>bread Omelette</strong>
    </div>
    <span class="price">₹55</span>
  </div>

  <div class="menu-item">
    <img src="../chicken omelette.jpg" alt="Double Egg Omelette">
    <div class="menu-text">
      <strong>Chicken Omelette</strong>
    </div>
    <span class="price">₹65</span>
  </div>

</section>

</body>
</html>
